name: TypeScript Check

on:
  pull_request:
    paths:
      - "**.ts"
      - "**.tsx"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typescript check
        run: tsc --noEmit
