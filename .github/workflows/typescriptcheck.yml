name: TypeScript Check

on:
  pull_request:
    paths:
      - "**.ts"
      - "**.tsx"

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Typescript check
        run: tsc --noEmit
